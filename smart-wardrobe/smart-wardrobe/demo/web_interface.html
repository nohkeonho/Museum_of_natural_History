<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>IoT 스마트 옷장</title>

<!-- ============================================================
     CSS 스타일 영역
     전체 UI의 색상, 레이아웃, 애니메이션을 정의합니다.
     ============================================================ -->
<style>
/* --- 구글 폰트 불러오기 --- */
/* JetBrains Mono: 숫자/데이터 표시용 고정폭 폰트 */
/* Noto Sans KR: 한국어 텍스트용 본문 폰트 */
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;600;700&display=swap');

/* --- 기본 리셋 --- */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#0B1117;color:#E2E8F0;min-height:100vh;overflow-x:hidden}

/* ============================
   상단 헤더 바 (앱 타이틀 + 연결 상태)
   ============================ */
.hdr{background:linear-gradient(180deg,#131B26 0%,#0B1117 100%);border-bottom:1px solid rgba(255,255,255,.06);padding:16px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10;backdrop-filter:blur(20px)}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-icon{width:32px;height:32px;background:linear-gradient(135deg,#3B82F6,#8B5CF6);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.hdr h1{font-size:15px;font-weight:600;letter-spacing:-.3px}
.hdr-sub{font-size:10px;color:#64748B;margin-top:1px}

/* --- 연결 상태 표시 (우측 상단) --- */
.conn{font-size:11px;color:#22C55E;display:flex;align-items:center;gap:6px}
.conn .dot{width:7px;height:7px;background:#22C55E;border-radius:50%;box-shadow:0 0 8px rgba(34,197,94,.5);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ============================
   메인 컨테이너 (카드들을 감싸는 영역)
   ============================ */
.wrap{max-width:480px;margin:0 auto;padding:16px;display:flex;flex-direction:column;gap:14px}

/* ============================
   섹션 카드 (섹션 A / 섹션 B 공통)
   ============================ */
.card{background:linear-gradient(135deg,rgba(30,41,59,.8),rgba(15,23,42,.9));border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:18px;position:relative;overflow:hidden;transition:transform .2s}

/* --- 카드 상단 색상 바 (섹션 구분용) --- */
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.card.ca::before{background:linear-gradient(90deg,#3B82F6,#60A5FA)}  /* 섹션 A: 파란색 */
.card.cb::before{background:linear-gradient(90deg,#F59E0B,#FBBF24)}  /* 섹션 B: 주황색 */

/* --- 카드 헤더 (섹션 라벨 + 의류 드롭다운) --- */
.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.card-label{display:flex;align-items:center;gap:8px}

/* --- 섹션 배지 (A / B 표시) --- */
.badge{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;letter-spacing:.5px}
.ca .badge{background:rgba(59,130,246,.15);color:#60A5FA;border:1px solid rgba(59,130,246,.2)}
.cb .badge{background:rgba(245,158,11,.15);color:#FBBF24;border:1px solid rgba(245,158,11,.2)}
.card-label span:last-child{font-size:13px;font-weight:500;color:#94A3B8}

/* --- 의류 종류 드롭다운 --- */
select{background:#0B1117;border:1px solid rgba(255,255,255,.1);color:#E2E8F0;padding:6px 10px;border-radius:8px;font-size:11px;font-family:'Noto Sans KR',sans-serif;outline:none;cursor:pointer;transition:border-color .2s}
select:focus{border-color:#3B82F6}

/* ============================
   온습도 표시 영역 (2열 그리드)
   ============================ */
.readings{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.rbox{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.04);border-radius:12px;padding:14px;text-align:center;position:relative}
.rbox .rl{font-size:10px;color:#64748B;margin-bottom:6px;text-transform:uppercase;letter-spacing:.8px;font-weight:500}

/* --- 온습도 숫자 (큰 글씨) --- */
.rbox .rv{font-family:'JetBrains Mono',monospace;font-size:32px;font-weight:500;line-height:1;letter-spacing:-1px}
.ca .rv{color:#60A5FA}  /* 섹션 A 숫자: 파란색 */
.cb .rv{color:#FBBF24}  /* 섹션 B 숫자: 주황색 */
.rbox .ru{font-size:16px;color:#64748B;font-weight:400}  /* 단위 (°C, %) */
.rbox .rt{font-size:10px;color:#475569;margin-top:8px;font-family:'JetBrains Mono',monospace}  /* 목표값 표시 */
.rbox .bar{position:absolute;bottom:0;left:10%;right:10%;height:2px;border-radius:1px;opacity:.3}
.ca .rbox .bar{background:#3B82F6}
.cb .rbox .bar{background:#F59E0B}

/* ============================
   장치 상태 표시 (제습 / 히터 / 순환팬)
   ============================ */
.devs{display:flex;gap:8px}
.dev{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:9px;border-radius:10px;font-size:11px;font-weight:500;transition:all .3s;border:1px solid transparent}

/* --- ON 상태: 초록색 --- */
.dev.on{background:rgba(34,197,94,.08);color:#22C55E;border-color:rgba(34,197,94,.15)}
/* --- OFF 상태: 회색 --- */
.dev.off{background:rgba(0,0,0,.2);color:#475569;border-color:rgba(255,255,255,.04)}

/* --- 상태 표시 LED (작은 원) --- */
.dev .dd{width:6px;height:6px;border-radius:50%;transition:all .3s}
.dev.on .dd{background:#22C55E;box-shadow:0 0 6px rgba(34,197,94,.5)}
.dev.off .dd{background:#334155}

/* ============================
   점진적 전환(램프 제어) 진행 표시
   ============================ */
.ramp{margin-top:10px;padding:8px 12px;background:rgba(139,92,246,.06);border:1px solid rgba(139,92,246,.12);border-radius:10px;font-size:11px;color:#A78BFA;text-align:center;display:none;animation:rampPulse 3s infinite}
.ramp.show{display:flex;align-items:center;justify-content:center;gap:6px}  /* 전환 중일 때만 표시 */
@keyframes rampPulse{0%,100%{opacity:1}50%{opacity:.6}}

/* ============================
   시스템 정보 카드 (Wi-Fi / 갱신 시간 / 모드)
   ============================ */
.sys{background:linear-gradient(135deg,rgba(30,41,59,.6),rgba(15,23,42,.7));border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:16px}
.sys-title{font-size:11px;font-weight:600;color:#475569;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px}
.sys-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.sys-item{background:rgba(0,0,0,.3);border-radius:10px;padding:10px;text-align:center}
.sys-item .sl{font-size:9px;color:#475569;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.sys-item .sv{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500}

/* ============================
   하단 푸터
   ============================ */
.ft{text-align:center;padding:20px 16px;font-size:10px;color:#334155}
.ft span{color:#3B82F6}

/* ============================
   데모 모드 배너
   ============================ */
.demo{background:linear-gradient(90deg,rgba(139,92,246,.1),rgba(59,130,246,.1));border:1px solid rgba(139,92,246,.15);border-radius:12px;padding:10px 14px;font-size:11px;color:#A78BFA;text-align:center;display:flex;align-items:center;justify-content:center;gap:6px}

/* ============================
   카드 등장 애니메이션 (아래에서 위로 슬라이드)
   ============================ */
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card,.sys,.demo{animation:slideUp .5s ease-out both}
.card:nth-child(2){animation-delay:.05s}
.card:nth-child(3){animation-delay:.1s}
.sys{animation-delay:.15s}
</style>
</head>
<body>

<!-- ============================================================
     HTML 구조 영역
     ============================================================ -->

<!-- ============================
     상단 헤더 바
     좌측: 앱 아이콘 + 제목 + 부제목
     우측: Wi-Fi 연결 상태 (녹색 점 + "연결됨")
     ============================ -->
<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-icon">🏠</div>
    <div>
      <h1>IoT 스마트 옷장</h1>
      <div class="hdr-sub">소재별 맞춤 온습도 관리</div>
    </div>
  </div>
  <div class="conn" id="connSt"><div class="dot"></div>연결됨</div>
</div>

<!-- ============================
     메인 컨테이너 시작
     ============================ -->
<div class="wrap">

  <!-- 데모 모드 안내 배너 -->
  <div class="demo">⚡ 데모 모드 — 시뮬레이션 데이터로 동작 중</div>

  <!-- ============================
       섹션 A 카드
       - 카드 상단: 섹션 라벨 + 의류 종류 드롭다운
       - 중앙: 온도/습도 실시간 표시 (2열)
       - 하단: 장치 상태 (제습/히터/순환팬)
       - 추가: 점진적 전환 진행 표시 (전환 중일 때만 보임)
       ============================ -->
  <div class="card ca">
    <!-- 카드 헤더: 섹션 이름 + 의류 선택 드롭다운 -->
    <div class="card-top">
      <div class="card-label"><span class="badge">A</span><span>섹션 A</span></div>
      <!-- 의류 종류 변경 시 setType('A', 선택값) 호출 -->
      <select id="selA" onchange="setType('A',this.value)">
        <option value="0">울/니트</option>
        <option value="1" selected>가죽</option>
        <option value="2">면/셔츠</option>
        <option value="3">패딩</option>
        <option value="4">실크</option>
        <option value="5">일반</option>
      </select>
    </div>
    <!-- 온습도 실시간 표시 영역 -->
    <div class="readings">
      <!-- 온도 박스 -->
      <div class="rbox">
        <div class="rl">🌡 온도</div>
        <div class="rv" id="tA">--<span class="ru">°C</span></div>     <!-- JS가 현재 온도를 여기에 갱신 -->
        <div class="rt" id="ttA">목표 --°C</div>                        <!-- JS가 목표 온도를 여기에 갱신 -->
        <div class="bar"></div>
      </div>
      <!-- 습도 박스 -->
      <div class="rbox">
        <div class="rl">💧 습도</div>
        <div class="rv" id="hA">--<span class="ru">%</span></div>      <!-- JS가 현재 습도를 여기에 갱신 -->
        <div class="rt" id="thA">목표 --%</div>                         <!-- JS가 목표 습도를 여기에 갱신 -->
        <div class="bar"></div>
      </div>
    </div>
    <!-- 장치 상태 표시 (ON/OFF) -->
    <div class="devs">
      <div class="dev off" id="pA"><div class="dd"></div>제습 OFF</div>    <!-- JS가 ON/OFF 전환 -->
      <div class="dev off" id="htA"><div class="dd"></div>히터 OFF</div>   <!-- JS가 ON/OFF 전환 -->
      <div class="dev on" id="fnA"><div class="dd"></div>순환팬</div>      <!-- 항상 ON (상시 가동) -->
    </div>
    <!-- 점진적 전환 진행 표시 (기본: 숨김, 전환 중: 표시) -->
    <div class="ramp" id="rampA">⏳ 점진적 전환 진행 중...</div>
  </div>

  <!-- ============================
       섹션 B 카드 (구조는 섹션 A와 동일)
       ============================ -->
  <div class="card cb">
    <div class="card-top">
      <div class="card-label"><span class="badge">B</span><span>섹션 B</span></div>
      <select id="selB" onchange="setType('B',this.value)">
        <option value="0" selected>울/니트</option>
        <option value="1">가죽</option>
        <option value="2">면/셔츠</option>
        <option value="3">패딩</option>
        <option value="4">실크</option>
        <option value="5">일반</option>
      </select>
    </div>
    <div class="readings">
      <div class="rbox"><div class="rl">🌡 온도</div><div class="rv" id="tB">--<span class="ru">°C</span></div><div class="rt" id="ttB">목표 --°C</div><div class="bar"></div></div>
      <div class="rbox"><div class="rl">💧 습도</div><div class="rv" id="hB">--<span class="ru">%</span></div><div class="rt" id="thB">목표 --%</div><div class="bar"></div></div>
    </div>
    <div class="devs">
      <div class="dev off" id="pB"><div class="dd"></div>제습 OFF</div>
      <div class="dev off" id="htB"><div class="dd"></div>히터 OFF</div>
      <div class="dev on" id="fnB"><div class="dd"></div>순환팬</div>
    </div>
    <div class="ramp" id="rampB">⏳ 점진적 전환 진행 중...</div>
  </div>

  <!-- ============================
       시스템 정보 카드
       Wi-Fi 상태, 마지막 갱신 시간, 동작 모드 표시
       ============================ -->
  <div class="sys">
    <div class="sys-title">시스템 정보</div>
    <div class="sys-grid">
      <div class="sys-item"><div class="sl">Wi-Fi</div><div class="sv" style="color:#22C55E">연결됨</div></div>
      <div class="sys-item"><div class="sl">갱신</div><div class="sv" id="lastUpd">--:--:--</div></div>   <!-- JS가 갱신 시각 표시 -->
      <div class="sys-item"><div class="sl">모드</div><div class="sv" style="color:#A78BFA">DEMO</div></div>
    </div>
  </div>

  <!-- 하단 푸터 -->
  <div class="ft">IoT 스마트 옷장 v1.0 · 자연사 박물관 · <span>자동 갱신 3초</span></div>
</div>

<!-- ============================================================
     JavaScript 영역
     데모 모드: NodeMCU 없이 가짜 센서 데이터를 생성하여 UI를 구동
     실제 모드: fetch('/status')로 NodeMCU에 데이터를 요청 (여기서는 사용 안 함)
     ============================================================ -->
<script>

// ============================================================
// 의류 프로파일 테이블
// Arduino 펌웨어의 profiles[] 배열과 동일한 순서/값
// tt: 목표 온도, th: 목표 습도, tolT: 온도 허용 오차, tolH: 습도 허용 오차
// ============================================================
const PROFILES = [
    { name: '울/니트', tt: 20.0, th: 55.0, tolT: 2.0, tolH: 5.0 },
    { name: '가죽',   tt: 16.0, th: 45.0, tolT: 2.0, tolH: 5.0 },
    { name: '면/셔츠', tt: 22.0, th: 50.0, tolT: 3.0, tolH: 5.0 },
    { name: '패딩',   tt: 18.0, th: 40.0, tolT: 2.0, tolH: 5.0 },
    { name: '실크',   tt: 18.0, th: 50.0, tolT: 2.0, tolH: 5.0 },
    { name: '일반',   tt: 22.0, th: 50.0, tolT: 3.0, tolH: 8.0 }
];

// ============================================================
// 시뮬레이션 상태 객체
// 각 섹션(A, B)의 현재 온습도, 의류 타입, 목표값, 장치 상태,
// 램프 제어(점진적 전환) 관련 변수를 관리
// ============================================================
let state = {
    A: {
        t: 18.5,           // 현재 온도
        h: 52.0,           // 현재 습도
        c: 1,              // 의류 타입 인덱스 (1 = 가죽)
        targetT: 16.0,     // 현재 적용 중인 목표 온도 (램프 적용 후)
        targetH: 45.0,     // 현재 적용 중인 목표 습도 (램프 적용 후)
        p: false,          // 펠티어(제습) ON/OFF
        ht: false,         // 히터 ON/OFF
        ramping: false,    // 점진적 전환 진행 중 여부
        rampStart: 0,      // 전환 시작 시각 (밀리초)
        rampFromT: 0,      // 전환 시작 시 목표 온도
        rampFromH: 0,      // 전환 시작 시 목표 습도
        rampToT: 16.0,     // 전환 끝 목표 온도
        rampToH: 45.0      // 전환 끝 목표 습도
    },
    B: {
        t: 22.3, h: 58.0, c: 0,
        targetT: 20.0, targetH: 55.0,
        p: false, ht: false,
        ramping: false, rampStart: 0,
        rampFromT: 0, rampFromH: 0,
        rampToT: 20.0, rampToH: 55.0
    }
};

// ============================================================
// simulate() — 물리 시뮬레이션 (3초마다 호출)
//
// 실제 Arduino 제어 로직을 JavaScript로 재현:
// 1. 램프 제어: 의류 변경 시 목표값을 30초에 걸쳐 선형 보간
// 2. 습도 우선 순차 제어: 습도 초과 → 제습 ON → 제습 완료 → 히터 ON
// 3. 과열 방지: 목표 +3°C 초과 시 히터 강제 OFF
// ============================================================
function simulate() {
    ['A','B'].forEach(s => {
        const sec = state[s];
        const prof = PROFILES[sec.c];

        // 센서 노이즈 시뮬레이션 (실제 DHT22도 ±0.3 정도 오차 있음)
        const noise = () => (Math.random() - 0.5) * 0.3;

        // --- 램프 제어 (점진적 전환) ---
        // 의류 변경 후 30초(데모)에 걸쳐 목표값을 선형 보간
        // 실제 시스템에서는 1~3시간 (소재별 rampTime)
        if (sec.ramping) {
            const ratio = Math.min((Date.now() - sec.rampStart) / 30000, 1.0);
            // 선형 보간: T_target(t) = T_start + (T_final - T_start) * (t / t_ramp)
            sec.targetT = sec.rampFromT + (sec.rampToT - sec.rampFromT) * ratio;
            sec.targetH = sec.rampFromH + (sec.rampToH - sec.rampFromH) * ratio;
            if (ratio >= 1.0) sec.ramping = false;  // 전환 완료
        }

        // --- 습도 우선 순차 제어 ---
        if (sec.h > sec.targetH + prof.tolH) {
            // 습도 초과 → 펠티어 제습 ON, 히터 OFF (습도 우선)
            sec.p = true;
            sec.ht = false;
            sec.h -= 0.8 + noise();    // 제습 효과 (습도 감소)
            sec.t -= 0.15 + noise();   // 펠티어 부수적 냉각 효과
        } else if (sec.h < sec.targetH - prof.tolH) {
            // 습도 정상 이하 → 제습 OFF
            sec.p = false;
            // 온도 확인: 미달이면 히터 ON
            if (sec.t < sec.targetT - prof.tolT) {
                sec.ht = true;
                sec.t += 0.5 + noise();   // 히터 가온 효과
            } else if (sec.t > sec.targetT + prof.tolT) {
                sec.ht = false;
                sec.t -= 0.1 + noise();   // 자연 냉각
            } else {
                sec.ht = false;
                sec.t += noise() * 0.5;   // 정상 범위: 미세 변동
            }
            sec.h += noise() * 0.5;
        } else {
            // 습도 정상 범위
            sec.p = false;
            if (sec.t < sec.targetT - prof.tolT) {
                sec.ht = true;
                sec.t += 0.5 + noise();
            } else if (sec.t > sec.targetT + prof.tolT) {
                sec.ht = false;
                sec.t -= 0.1 + noise();
            } else {
                sec.ht = false;
                sec.t += noise() * 0.3;
            }
            sec.h += noise() * 0.3;
        }

        // --- 과열 방지 안전장치 ---
        // 현재 온도가 목표 + 3°C 초과하면 히터 강제 OFF
        if (sec.t > sec.targetT + 3.0) sec.ht = false;

        // --- 값 범위 제한 (비현실적인 값 방지) ---
        sec.t = Math.max(10, Math.min(35, sec.t));
        sec.h = Math.max(20, Math.min(80, sec.h));
    });
}

// ============================================================
// updateUI() — 시뮬레이션 결과를 화면에 반영
// 각 섹션의 온습도 숫자, 목표값, 장치 ON/OFF 상태를 갱신
// ============================================================
function updateUI() {
    ['A','B'].forEach(s => {
        const sec = state[s];

        // 현재 온도/습도 숫자 갱신
        document.getElementById('t'+s).innerHTML = sec.t.toFixed(1) + '<span class="ru">°C</span>';
        document.getElementById('h'+s).innerHTML = sec.h.toFixed(1) + '<span class="ru">%</span>';

        // 목표 온도/습도 표시 갱신
        document.getElementById('tt'+s).textContent = '목표 ' + sec.targetT.toFixed(1) + '°C';
        document.getElementById('th'+s).textContent = '목표 ' + sec.targetH.toFixed(1) + '%';

        // 장치 ON/OFF 상태 갱신
        setDev('p'+s, sec.p, '제습');
        setDev('ht'+s, sec.ht, '히터');

        // 점진적 전환 표시 (ramping이 true일 때만 보이게)
        document.getElementById('ramp'+s).className = 'ramp' + (sec.ramping ? ' show' : '');
    });

    // 마지막 갱신 시각 표시
    const n = new Date();
    document.getElementById('lastUpd').textContent =
        [n.getHours(), n.getMinutes(), n.getSeconds()]
        .map(v => String(v).padStart(2,'0')).join(':');
}

// ============================================================
// setDev() — 장치 상태 UI 갱신 헬퍼
// id: HTML 요소 ID, on: true/false, label: 표시 텍스트
// ============================================================
function setDev(id, on, label) {
    const el = document.getElementById(id);
    el.className = 'dev ' + (on ? 'on' : 'off');
    el.innerHTML = '<div class="dd"></div>' + label + (on ? ' ON' : ' OFF');
}

// ============================================================
// setType() — 의류 종류 변경 (드롭다운 선택 시 호출)
//
// 점진적 전환(램프 제어) 시작:
// 현재 목표값을 시작점으로, 새 프로파일 목표값을 끝점으로 설정
// 30초(데모)에 걸쳐 선형 보간으로 전환
// ============================================================
function setType(section, typeIdx) {
    const sec = state[section];
    const prof = PROFILES[typeIdx];

    // 현재 목표값 저장 (램프 시작점)
    sec.rampFromT = sec.targetT;
    sec.rampFromH = sec.targetH;

    // 새 프로파일의 목표값 (램프 끝점)
    sec.rampToT = prof.tt;
    sec.rampToH = prof.th;

    // 램프 시작
    sec.ramping = true;
    sec.rampStart = Date.now();
    sec.c = parseInt(typeIdx);
}

// ============================================================
// 메인 루프: 3초마다 시뮬레이션 실행 + UI 갱신
// ============================================================
updateUI();  // 초기 화면 표시
setInterval(() => {
    simulate();   // 물리 시뮬레이션
    updateUI();   // 화면 갱신
}, 3000);

</script>
